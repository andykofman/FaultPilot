name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # The unit suite is no-SITL; it needs only the analysis/MAVLink libs,
        # not the full simulator toolchain (MAVProxy, dronecan, opencv).
        run: |
          python -m pip install --upgrade pip
          pip install pymavlink questionary numpy matplotlib pytest

      - name: Run unit tests
        run: PYTHONPATH=src python -m pytest tests/ -q
